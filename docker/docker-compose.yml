version: '3.8'

services:
  nuvem:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: nuvem
    command: ["python", "-m", "cloud.nuvem"]
    network_mode: host
    environment:
      - NUM_PONTOS=5
      - IN_DOCKER=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 5s
      timeout: 30s
      retries: 3

  ponto:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "charging_points.ponto_recarga"]
    network_mode: host
    environment:
      - BASE_PORT=6000
      - IN_DOCKER=true
    deploy:
      replicas: 5

  cliente:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "clients.cliente"]
    network_mode: host
    environment:
      - IN_DOCKER=true
    depends_on:
      nuvem:
        condition: service_healthy
    deploy:
      replicas: 3